# One System CAS - Java sample configuration
# ------------------------------------------------------------------
# Every value is sourced from an environment variable (see .env.example),
# with a localhost-friendly default so the app starts even without a .env.
# Spring resolves ${ENV_VAR:default} from the OS environment.

# App HTTP port (assigned port for this sample).
server.port=${APP_PORT:9105}

# CAS server origin for INTERNAL back-channel calls (token validation),
# e.g. http://localhost:8080 or an internal docker name like http://one-system-cas.
cas.server-url=${CAS_BASE_URL:http://localhost:8080}

# PUBLIC, browser-facing CAS origin used ONLY to build the /sso/login redirect.
# In split-horizon deployments the browser reaches CAS at a different (public)
# host than the back-channel above. Defaults to cas.server-url when unset so
# single-url local dev keeps working unchanged.
cas.public-url=${CAS_PUBLIC_URL:${CAS_BASE_URL:http://localhost:8080}}

# The client_id / client_secret registered for THIS app on the CAS server.
# The secret is server-side only and is used to validate tokens.
cas.client-id=${CAS_CLIENT_ID:java-sample}
cas.client-secret=${CAS_CLIENT_SECRET:changeme-client-secret}

# Must EXACTLY match the callback_url registered for this client on the CAS
# server. The CAS server redirects the browser here with ?token=<JWT>.
cas.callback-url=${CAS_CALLBACK_URL:http://localhost:9105/callback}

# ------------------------------------------------------------------
# LOCAL user store (username/password accounts) - SQLite.
#
# A single file on disk holds the `users` table. The directory must be
# writable at runtime (the Dockerfile creates ./data and runs as a user that
# owns it). Two demo users are seeded on startup if the table is empty:
#     rajan / rajan123      demo / demo123
# ------------------------------------------------------------------
spring.datasource.url=${APP_DB_URL:jdbc:sqlite:./data/app.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
# SQLite is single-writer; keep the pool tiny so concurrent JDBC calls don't
# trip "database is locked".
spring.datasource.hikari.maximum-pool-size=1
