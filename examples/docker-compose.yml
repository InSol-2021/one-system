# =============================================================================
# One System CAS — sample applications (ports 9101-9111)
#
# Brings up all eleven example apps alongside a running CAS server. Each image is
# built with the repo ROOT as the build context (context: ..) because every
# sample links its SDK from the sibling packages/ directory.
#
# Usage (single server):
#   1. Start the CAS server stack first (it creates the shared docker network):
#        docker compose -f docker-compose.yml up -d        # or docker-production.yml
#   2. Run migrations + seed the demo client registrations:
#        docker compose -f docker-compose.yml exec php php artisan migrate --force
#        docker compose -f docker-compose.yml exec php php artisan db:seed --class="Database\\Seeders\\SampleClientsSeeder" --force
#   3. Start the samples:
#        cd examples && docker compose up -d --build
#   4. Open http://localhost:9101 ... http://localhost:9111
#
# CAS URL (split horizon): set CAS_PUBLIC_URL to an address reachable by BOTH the
# browser AND the sample containers — on a real server that is the server's domain
# or LAN IP (e.g. http://203.0.113.10:8000). On Docker Desktop for pure localhost,
# the containers can reach the host via host.docker.internal (extra_hosts below).
#
# Secrets are DEMO placeholders that must match SampleClientsSeeder. Override the
# *_CAS_SECRET vars (here and in the seeder env) for any real use. See ../DEPLOYMENT.md.
# =============================================================================

x-sample-common: &sample-common
  restart: unless-stopped
  networks: [one-system-network]
  # Split-horizon: containers validate tokens server-to-server against
  # CAS_INTERNAL_URL (the CAS service's docker name on one-system-network), while
  # the browser is redirected to CAS_PUBLIC_URL for /sso/login. host.docker.internal
  # is kept for Docker Desktop single-URL local dev (where one URL reaches both).
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  sample-laravel:
    <<: *sample-common
    build: { context: .., dockerfile: examples/laravel/Dockerfile }
    image: one-system-sample-laravel
    container_name: os-sample-laravel
    ports: ["9101:9101"]
    environment:
      APP_PORT: 9101
      # Public origin the browser is sent back to (drives route('callback') ->
      # redirect_uri, which must match the seeded callback_url).
      APP_URL: ${SAMPLE_BASE_HOST:-http://localhost}:9101
      CAS_BASE_URL: ${CAS_INTERNAL_URL:-http://host.docker.internal:8000}
      CAS_PUBLIC_URL: ${CAS_PUBLIC_URL:-http://host.docker.internal:8000}
      CAS_SERVER_URL: ${CAS_INTERNAL_URL:-http://host.docker.internal:8000}
      CAS_CLIENT_ID: laravel-sample
      CAS_CLIENT_SECRET: ${LARAVEL_CAS_SECRET:-demo-secret-laravel}
      CAS_CALLBACK_URL: ${SAMPLE_BASE_HOST:-http://localhost}:9101/callback

  sample-nodejs:
