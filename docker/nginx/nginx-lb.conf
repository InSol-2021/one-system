# Nginx Load Balancer Configuration for Laravel CAS
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '"$upstream_addr" "$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 64M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream one-system-backend {
        least_conn;
        server one-system:80 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=3r/s;

    server {
        listen 80;
        server_name localhost cas.example.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location ~ ^/admin/ {
            limit_req zone=admin burst=3 nodelay;
            proxy_pass http:/one-system-backend;
            include /etc/nginx/proxy_params;
        }

        location ~ ^/(auth|api)/ {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://one-system-backend;
            include /etc/nginx/proxy_params;
        }

        location ~ ^/user/ {
            limit_req zone=api burst=15 nodelay;
            proxy_pass http://one-system-backend;
            include /etc/nginx/proxy_params;
        }

        location ~ ^/(docs|downloads)/ {
            expires 1h;
            proxy_pass http://one-system-backend;
            include /etc/nginx/proxy_params;
        }

        location /health {
            access_log off;
            proxy_pass http://one-system-backend/health;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://one-system-backend;
            include /etc/nginx/proxy_params;
        }
    }

    # HTTPS server (uncomment when SSL certificates are available)
    # server {
    #     listen 443 ssl http2;
    #     server_name cas.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cas.crt;
    #     ssl_certificate_key /etc/nginx/ssl/cas.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     location / {
    #         proxy_pass http://one-system-backend;
    #         include /etc/nginx/proxy_params;
    #     }
    # }
}

